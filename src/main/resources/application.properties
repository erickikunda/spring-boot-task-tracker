spring.application.name=taskflow
server.port=8080

# Holding the Hibernate session open for the entire HTTP lifecycle
# silently triggers lazy-load queries during Jackson serialization (N+1).
# Set false on day one — let LazyInitializationException tell you where to add joins.
spring.jpa.open-in-view=false

# Flyway is off by default; enabled only in the prod profile.
spring.flyway.enabled=false

# Actuator: health + info public, everything else requires authentication.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# JWT — overridden by each profile. Secret must be >= 32 chars (256 bits for HS256).
app.jwt.secret=change-me-this-is-a-placeholder-that-is-long-enough
app.jwt.expiry-ms=86400000

