spring.application.name=taskflow
server.port=8080

# Holding the Hibernate session open for the entire HTTP lifecycle
# silently triggers lazy-load queries during Jackson serialization (N+1).
# Set false on day one — let LazyInitializationException tell you where to add joins.
spring.jpa.open-in-view=false

# Flyway is off by default; enabled only in the prod profile.
spring.flyway.enabled=false

# Actuator: health, info, and metrics public; everything else requires authentication.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always

# Add correlationId from MDC to the text log pattern (dev/test).
# Prod JSON output includes all MDC keys automatically; this only affects text format.
logging.pattern.correlation=[%X{correlationId:-?}]

# JWT — overridden by each profile. Secret must be >= 32 chars (256 bits for HS256).
# Dev default is a Base64-encoded 32-byte key. Prod MUST override via JWT_SECRET env var
# with a properly generated: openssl rand -base64 32
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC0zMmItaGU=}
app.jwt.expiry-ms=86400000

# CORS — dev default allows the Vite dev server. Prod overrides via CORS_ALLOWED_ORIGINS env var.
app.cors.allowed-origins=http://localhost:5173

