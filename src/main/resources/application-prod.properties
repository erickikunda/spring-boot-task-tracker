# ─────────────────────────────────────────────────────────────────────────────
# Profile: prod  (PostgreSQL via Docker Compose)
# Run with:  docker compose up -d
#            SPRING_PROFILES_ACTIVE=prod \
#              DB_URL=jdbc:postgresql://localhost:5432/taskflow \
#              DB_USER=appuser \
#              DB_PASSWORD=changeme \
#              JWT_SECRET=<your-256-bit-secret> \
#              ./mvnw spring-boot:run
# ─────────────────────────────────────────────────────────────────────────────

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# HikariCP tuning — sensible defaults for a single-node app
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Hibernate must not touch the schema — Flyway owns it
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.h2.console.enabled=false

# Structured JSON logging — one JSON object per line, parsed by ELK / Grafana Loki.
# All MDC fields (correlationId, userId) appear automatically as JSON keys.
# logback-spring.xml uses CONSOLE_LOG_STRUCTURED_FORMAT and FILE_LOG_STRUCTURED_FORMAT.
logging.structured.format.console=logstash
logging.structured.format.file=logstash
logging.file.name=logs/taskflow.log

app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-ms=3600000

# CORS — comma-separated list of allowed origins; e.g. https://app.yourdomain.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
