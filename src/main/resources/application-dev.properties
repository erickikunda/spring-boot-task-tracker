# ─────────────────────────────────────────────────────────────────────────────
# Profile: dev  (default — no Docker required)
# Run with:  ./mvnw spring-boot:run
#            or set Active profiles = dev in IntelliJ run config
# ─────────────────────────────────────────────────────────────────────────────

# H2 in-memory — DB_CLOSE_DELAY=-1 keeps it alive between connections
spring.datasource.url=jdbc:h2:mem:taskflow;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 browser console — http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:taskflow   User: sa   Password: (empty)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate manages the schema in dev (no Flyway needed)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Verbose logging for learning — app + security levels live in logback-spring.xml <springProfile name="dev">
logging.level.org.springframework.web=DEBUG

# Dev JWT secret — must be >= 32 bytes for HS256; this is intentionally insecure
app.jwt.secret=dev-only-insecure-secret-key-change-in-prod-padding-here!
app.jwt.expiry-ms=86400000
